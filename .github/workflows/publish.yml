name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} must match package.json version ${PACKAGE_VERSION} as ${EXPECTED_TAG}"
            exit 1
          fi

  stage:
    name: Stage package on npm
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    environment: npm-publish

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "24"
          cache: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check formatting, lint, and types
        run: vp check

      - name: Run tests
        run: vp test run

      - name: Validate package exports
        run: vp run check:exports

      - name: Install npm with staged publishing support
        run: npm install --global npm@11.15.0

      - name: Assert npm staged publishing support
        run: |
          npm --version
          npm stage --help

      - name: Dry-run npm package contents
        run: npm pack --dry-run

      - name: Stage package on npm
        run: npm stage publish --ignore-scripts
