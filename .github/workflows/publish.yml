name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  stage:
    name: Stage package on npm
    runs-on: ubuntu-latest
    environment: npm-publish
    if: startsWith(github.event.release.tag_name, 'v')

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@7c4126aacecd1f4454bb0d6f6e104f14df67d46e
        with:
          node-version: "24"
          cache: false

      - name: Install dependencies
        run: vp install

      - name: Check formatting, lint, and types
        run: vp check

      - name: Run tests
        run: vp test run

      - name: Build package
        run: vp pack

      - name: Validate published package shape
        run: vp dlx publint

      - name: Install npm with staged publishing support
        run: npm install --global npm@11.15.0

      - name: Assert npm staged publishing support
        run: |
          npm --version
          npm stage --help

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "v${PACKAGE_VERSION}" != "${RELEASE_TAG}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Dry-run npm package contents
        run: npm pack --dry-run

      - name: Stage package on npm
        run: npm stage publish
